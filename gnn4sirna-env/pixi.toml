[workspace]
channels = ["conda-forge"]
name = "gnn4sirna-env"
platforms = ["linux-64"]
version = "0.1.0"

[system-requirements]
cuda = "12"

[tasks]
train-gnn = { cmd = "python model/GNN4siRNA.py", cwd = "../model" }

[dependencies]
python = "3.11.*"
pandas = "*"
numpy = "*"
scikit-learn = "*"
scipy = "*"
tensorflow = { version = "2.15.*", channel = "conda-forge" }
cudnn = "*"

[pypi-dependencies]
stellargraph = "*"
chardet = "*"
