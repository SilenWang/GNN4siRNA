[workspace]
channels = ["conda-forge", "bioconda"]
name = "gnn4sirna-env"
platforms = ["linux-64"]
version = "0.1.2"

[system-requirements]
cuda = "12"

[tasks]
train-gnn = { cmd = "python model/GNN4siRNA.py", cwd = "../model" }

[dependencies]
python = "3.11.*"
pandas = "*"
numpy = "*"
scikit-learn = "*"
scipy = "*"
tensorflow = { version = "2.15.*", channel = "conda-forge" }
cudnn = "*"

biopython = ">=1.81"
matplotlib = ">=3.7"
viennarna = "2.*"

[pypi-dependencies]
stellargraph = "*"
chardet = "*"
